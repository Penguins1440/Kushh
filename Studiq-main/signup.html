<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Study Routine Maker – Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <header class="auth-top">
    <a href="index.html" class="logo" title="Back to home">
      <img src="logo.png" alt="Studiq" class="navbar-logo" />
      <strong>Studiq</strong>
    </a>
  </header>

  <main class="auth-container">
    <section class="auth-card fade-in">
      <h1 class="auth-title">Create Your Account!</h1>
      <p class="auth-sub">Join Studiq in seconds</p>

      <form id="signup-form" class="auth-form" novalidate>
        <label class="input-group">
          <input type="text" id="signup-name" name="name" placeholder="Full Name" autocomplete="name" required />
        </label>
        <label class="input-group">
          <input type="email" id="signup-email" name="email" placeholder="Email" autocomplete="email" required />
        </label>
        <label class="input-group">
          <input type="password" id="signup-password" name="password" placeholder="Password" autocomplete="new-password" required />
        </label>
        <label class="input-group">
          <input type="password" id="signup-confirm" name="confirm_password" placeholder="Confirm Password" autocomplete="new-password" required />
        </label>
        <button type="submit" class="btn btn-primary auth-btn">Sign Up</button>
        <div id="signup-message" class="auth-message" aria-live="polite"></div>
      </form>

      <p class="auth-alt">Already have an account? <a href="login.html">Log in here</a>.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
