<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Study Routine Maker – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <header class="auth-top">
    <a href="index.html" class="logo" title="Back to home">
      <img src="logo.png" alt="Studiq" class="navbar-logo" />
      <strong>Studiq</strong>
    </a>
  </header>

  <main class="auth-container">
    <section class="auth-card fade-in">
      <h1 class="auth-title">Welcome!</h1>
      <p class="auth-sub">Log in to continue</p>

      <form id="login-form" class="auth-form" novalidate>
        <label class="input-group">
          <input type="email" id="login-email" name="email" placeholder="Email" autocomplete="email" required />
        </label>
        <label class="input-group">
          <input type="password" id="login-password" name="password" placeholder="Password" autocomplete="current-password" required />
        </label>
        <button type="submit" class="btn btn-primary auth-btn">Login</button>
        <div id="login-message" class="auth-message" aria-live="polite"></div>
      </form>

      <p class="auth-alt">Don't have an account? <a href="signup.html">Sign up here</a>.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
